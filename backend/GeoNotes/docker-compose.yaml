version: '3.8'

services:
  db:
    image: public.ecr.aws/docker/library/postgres:15
    container_name: geonotes-db
    environment:
      POSTGRES_DB: geonotes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Yesimkaya100619
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: geonotes-backend
    ports:
      - "8083:8083"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/geonotes
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: Yesimkaya100619
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

  jenkins:
    image: jenkins/jenkins:lts
    container_name: geonotes-jenkins
    ports:
      - "8081:8080"  # Farklı bir port (8081) belirleyin
    volumes:
      - jenkins_home:/var/jenkins_home
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    restart: always


volumes:
  jenkins_home:
    driver: local
