<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>GeoNotes - Notlarım</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        .note-item { border-bottom: 1px solid #eee; padding: 10px; display: flex; justify-content: space-between; }
        .add-btn { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 20px; }
        #json-preview { background: #2c3e50; color: #ecf0f1; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h1 id="page-title">GeoNotes Uygulaması</h1>
    <div id="notes-list">
        <div id="json-preview">[ {"id": 1, "title": "İlk Notum", "content": "Merhaba Dünya"} ]</div>
    </div>
    <button class="add-btn" onclick="window.location.href='add-note.html'" id="btn-go-to-add">Yeni Not Ekle</button>
</div>
</body>
</html>
